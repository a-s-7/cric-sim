name: Match Update Agent

on:
  schedule:
    - cron: '18 18 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger match update and wait
        run: |
          curl --max-time 300 \
               --retry 2 \
               --retry-delay 10 \
               -X POST \
               -f \
               https://cric-sim.onrender.com/run-match-update
